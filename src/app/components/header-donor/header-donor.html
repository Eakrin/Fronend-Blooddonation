<header class="header">
  <div class="container">

    <!-- Logo -->
    <div class="logo">
      <div class="logo-icon">🩸</div>
      <div class="logo-text">
        <h3>สุทธาเวช</h3>
        <span>SUTTAVEJ BLOOD CENTER</span>
      </div>
    </div>

    <!-- Menu -->
    <nav class="menu">
      <a routerLink="/home-donor" routerLinkActive="active">หน้าหลัก</a>
      <a routerLink="/booking-history" routerLinkActive="active">คลังของฉัน</a>
    </nav>

    <!-- Right -->
    <div class="user-info">

      <div class="notif-btn">
        <span class="material-icons-outlined">notifications</span>
        <span class="notif-dot"></span>
      </div>

      <div class="divider"></div>

      <div class="user-text">
        <span class="user-name">{{ userName }}</span>
        <span class="user-role">ผู้บริจาคโลหิต</span>
      </div>

      <div class="avatar" (click)="toggleDropdown()">
        <span>{{ userName.charAt(0) }}</span>
      </div>

      <div class="dropdown" *ngIf="showDropdown">
        <div class="dropdown-header">
          <span class="d-name">{{ userName }}</span>
          <span class="d-role">ผู้บริจาคโลหิต</span>
        </div>
        <div class="dropdown-item" (click)="goToProfile()">
          👤 โปรไฟล์ของฉัน
        </div>
        <div class="dropdown-divider"></div>
        <div class="dropdown-item logout" (click)="logout()">
          🚪 ออกจากระบบ
        </div>
      </div>

    </div>

  </div>
</header>
