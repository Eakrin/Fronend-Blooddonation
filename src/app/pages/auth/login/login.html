<div class="login-container">

  <div class="left">
    <div class="welcome">

      <span class="badge">💉 โครงการบริจาคโลหิตออนไลน์</span>

      <h1>
        ยินดีต้อนรับสู่ <br>
        <span>สุทธาเวช Blood Center</span>
      </h1>

      <p class="desc">
        การบริจาคของคุณช่วยต่อชีวิตผู้ป่วย <br>
        มาร่วมเป็นส่วนหนึ่งในการให้ที่ยิ่งใหญ่
      </p>

      <div class="stats">
        <div class="box">
          <h3>1,200+</h3>
          <p>ผู้บริจาคเดือนนี้</p>
        </div>

        <div class="box">
          <h3>24/7</h3>
          <p>จองคิวได้ตลอดเวลา</p>
        </div>
      </div>

      <img src="assets/blood.png" class="blood-img" alt="Blood Donation">

    </div>
  </div>

  <div class="right">
    <div class="login-box">

      <h2>เข้าสู่ระบบ</h2>
      <p class="sub">กรุณากรอกข้อมูลเพื่อเข้าสู่ระบบ</p>

      <div class="input-group">
        <input type="email" placeholder="example@email.com" [(ngModel)]="email">
      </div>

      <div class="input-group">
        <input type="password" placeholder="อย่างน้อย 8 ตัวอักษร" [(ngModel)]="password">
      </div>

      <button class="login-btn" (click)="login()">
        เข้าสู่ระบบ
      </button>

      <div class="divider">
        <span>หรือ</span>
      </div>

      <button class="google-btn">
        🔵 Continue with Google
      </button>

      <p class="register">
        ยังไม่มีบัญชี?
        <span routerLink="/register">สมัครสมาชิก</span>
      </p>

    </div>
  </div>

</div>
